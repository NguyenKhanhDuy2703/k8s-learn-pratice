name: Reusable Manifest Updater

on:
  workflow_call:
    inputs:
      image_name:
        description: "Tên của Docker image"
        required: true
        type: string
      manifest_file_path:
        description: "Đường dẫn tới file deployment.yaml cần sửa"
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      GH_PAT:
        required: false   # optional — fallback về GITHUB_TOKEN nếu không có

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    # Cấp quyền write cho GITHUB_TOKEN ở job level
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Dùng GH_PAT nếu có, không thì dùng GITHUB_TOKEN (đã có write permission)
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Update Image Tag in Deployment
        run: |
          sed -i "s|image: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:.*|image: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:${{ github.sha }}|g" ${{ inputs.manifest_file_path }}

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add ${{ inputs.manifest_file_path }}
          git commit -m "chore(cd): update ${{ inputs.image_name }} image tag to ${{ github.sha }}" || echo "No changes to commit"
          git push
