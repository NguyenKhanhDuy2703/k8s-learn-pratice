name: Reusable Manifest Updater

on:
  workflow_call:
    inputs:
      image_name:
        description: "Tên của Docker image"
        required: true
        type: string
      manifest_file_path:
        description: "Đường dẫn tới file deployment.yaml cần sửa"
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      GH_PAT:
        required: false

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          fetch-depth: 0

      - name: Update Image Tag in Deployment
        run: |
          # sed tìm dòng image: <username>/<image_name>:* và thay tag = commit sha
          sed -i "s|image: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:.*|image: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:${{ github.sha }}|g" ${{ inputs.manifest_file_path }}
          echo "Updated image tag:"
          grep "image:" ${{ inputs.manifest_file_path }}

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add ${{ inputs.manifest_file_path }}
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(cd): update ${{ inputs.image_name }} to ${{ github.sha }}"
          # pull rebase để tránh conflict khi BE và FE cùng push
          git pull --rebase origin main
          git push origin main
