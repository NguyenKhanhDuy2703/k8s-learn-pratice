name: Reusable Docker Build & Push

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Thư mục chứa mã nguồn và Dockerfile"
        required: true
        type: string
      image_name:
        description: "Tên của Docker image (VD: backend-api)"
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.working_directory }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:latest