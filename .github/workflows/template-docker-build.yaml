name: Reusable Docker Build & Push

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Thư mục chứa mã nguồn và Dockerfile"
        required: true
        type: string
      image_name:
        description: "Tên của Docker image (VD: backend-api)"
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify secrets are set
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "::error::DOCKER_USERNAME secret is not set!"
            exit 1
          fi
          if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "::error::DOCKER_PASSWORD secret is not set!"
            exit 1
          fi
          echo "Secrets OK — pushing as: ${{ secrets.DOCKER_USERNAME }}"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.working_directory }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:latest

      - name: Verify image pushed
        run: |
          echo "Image pushed successfully:"
          echo "  ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:${{ github.sha }}"
          echo "  ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:latest"