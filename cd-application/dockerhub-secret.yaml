# Tạo secret này bằng lệnh kubectl bên dưới, KHÔNG commit file chứa credentials lên git
# kubectl create secret docker-registry dockerhub-credentials \
#   --namespace=visualizer \
#   --docker-server=https://index.docker.io/v1/ \
#   --docker-username=<DOCKER_USERNAME> \
#   --docker-password=<DOCKER_PASSWORD_OR_TOKEN> \
#   --docker-email=<EMAIL>
#
# Hoặc dùng Docker Hub Access Token (khuyến nghị):
# Docker Hub → Account Settings → Security → New Access Token → Read-only
# Sau đó chạy lệnh trên với --docker-password=<ACCESS_TOKEN>
#
# Verify:
# kubectl get secret dockerhub-credentials -n visualizer
