apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-visualizer-fe
  namespace: k8s-visualizer
  labels:
    app: k8s-visualizer-fe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-visualizer-fe
  template:
    metadata:
      labels:
        app: k8s-visualizer-fe
    spec:
      containers:
        - name: fe
          image: nguyenkhanhduy/k8s-visualizer-fe:latest   # sẽ được CI/CD update tag
          ports:
            - containerPort: 80
          env:
            - name: VITE_API_URL
              value: "http://k8s-visualizer-be.k8s-visualizer.svc.cluster.local:3001"
            - name: VITE_WS_URL
              value: "http://k8s-visualizer-be.k8s-visualizer.svc.cluster.local:3001"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
