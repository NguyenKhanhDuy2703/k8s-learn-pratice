# RBAC cho BE pod — cần quyền đọc nodes/pods/services để gọi K8s API
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-visualizer-sa
  namespace: k8s-visualizer

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-visualizer-reader
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "services", "namespaces"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-visualizer-reader-binding
subjects:
  - kind: ServiceAccount
    name: k8s-visualizer-sa
    namespace: k8s-visualizer
roleRef:
  kind: ClusterRole
  name: k8s-visualizer-reader
  apiGroup: rbac.authorization.k8s.io
