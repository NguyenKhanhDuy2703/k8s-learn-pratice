apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-visualizer-be
  namespace: visualizer
  labels:
    app: k8s-visualizer-be
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k8s-visualizer-be
  template:
    metadata:
      labels:
        app: k8s-visualizer-be
      annotations: 
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: k8s-visualizer-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      imagePullSecrets:
        - name: dockerhub-credentials
      containers:
        - name: be
          image: nkd7059181/k8s-visualizer-be:f58584c17b8de16f1ec1aa0d8a7ffc1f6985c879
          ports:
            - containerPort: 3001
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: PORT
              value: "3001"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
