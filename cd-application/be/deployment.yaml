apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-visualizer-be
  namespace: visualizer
  labels:
    app: k8s-visualizer-be
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-visualizer-be
  template:
    metadata:
      labels:
        app: k8s-visualizer-be
    spec:
      serviceAccountName: k8s-visualizer-sa
      containers:
        - name: be
          image: nguyenkhanhduy/k8s-visualizer-be:bbf78a4ab12699e906d96690a05eef3a55d97c41
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
