apapiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd     
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default          
  
  source:
    repoURL: 'https://github.com/NguyenKhanhDuy2703/k8s-learn-pratice' 
    targetRevision: main                                      
    path: cd/cd-application                                    

  destination:
    server: 'https://kubernetes.default.svc'                 
    namespace: argocd                                         
    
  syncPolicy:
    automated:
      prune: true            
      selfHeal: true         
    syncOptions:
      - CreateNamespace=true 