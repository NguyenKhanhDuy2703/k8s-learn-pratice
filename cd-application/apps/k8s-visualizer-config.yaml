apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-visualizer
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/NguyenKhanhDuy2703/k8s-learn-pratice.git'
    targetRevision: main
    path: cd-application/k8s-visualizer   # ArgoCD sẽ apply tất cả yaml trong folder này
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: k8s-visualizer
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
