apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: be-application
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: visualizer-project
  source:
    repoURL: 'https://github.com/NguyenKhanhDuy2703/k8s-learn-pratice.git'
    targetRevision: main
    path: cd-application/be
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: visualizer
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
