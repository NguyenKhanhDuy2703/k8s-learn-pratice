apiVersion: v1
kind: Deployment
metadata:
  name: frontend-web
spec:
  replica: 2
  selector:
    matchLabels:
      app: frontend-web
  template:
    metadata:
      labels:
        app: frontend-web
    spec:
      containers:
        - name: nginx-frontend
          image: nguyenkhanhduy/frontend-web-nguyenkhanhduy:latest
          resources:
            requests:
              memory: "50Mi"
              cpu: "60Mi"
            limits:
              memory: "128Mi"
              cpu: "500m"
          ports:
            - containerPort: 80

  livenessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 5
    periodSeconds: 10

  strategy:
  canary:
    steps:
      - setWeight: 50
      - pause: { duration: 5m }
      - setWeight: 100
